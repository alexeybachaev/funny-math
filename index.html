<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>🎓 Весёлая математика — Тренажёр</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Заголовок -->
        <div class="app-header">
            <span class="mascot" id="mascotEmoji">🦉</span>
            <h1>Весёлая <span class="gradient-text">математика</span></h1>
        </div>

        <!-- Статистика -->
        <div class="stats-row">
            <div class="stat-badge" title="Правильных ответов">
                <span class="emoji">⭐</span>
                <span id="scoreDisplay">0</span>
            </div>
            <div class="stat-badge wrong-badge" title="Неправильных ответов">
                <span class="emoji">❌</span>
                <span id="wrongDisplay">0</span>
            </div>
            <div class="stat-badge streak-badge" title="Серия правильных">
                <span class="emoji">🔥</span>
                <span id="streakDisplay">0</span>
            </div>
            <div class="stat-badge" title="Лучшая серия">
                <span class="emoji">🏆</span>
                <span id="bestStreakDisplay">0</span>
            </div>
            <button class="reset-btn" id="resetBtn" title="Сбросить счёт">🔄 Сброс</button>
            <button class="reset-btn" id="themeBtn" title="Тёмная/светлая тема">🌙</button>
        </div>

        <!-- Настройки -->
        <div class="settings-panel">
            <!-- Выбор количества членов -->
            <div class="settings-row">
                <span class="settings-label">Членов</span>
                <div class="count-pills" id="countPills">
                    <button class="count-pill active" data-count="2">2</button>
                    <button class="count-pill" data-count="3">3</button>
                    <button class="count-pill" data-count="4">4</button>
                </div>
            </div>

            <!-- Индивидуальные настройки для каждого члена -->
            <div class="members-container" id="membersContainer"></div>
        </div>

        <!-- Карточка с примером -->
        <div class="problem-card" id="problemCard">
            <div class="problem-expression" id="problemExpression"></div>
        </div>

        <!-- Поле ввода и кнопка проверки -->
        <div class="input-area">
            <input type="text" class="answer-input" id="answerInput" placeholder="?" inputmode="numeric"
                pattern="[0-9]*" autocomplete="off">
            <button class="submit-btn" id="submitBtn">✅ Проверить</button>
        </div>

        <!-- Кнопка "Далее" -->
        <div style="text-align:center;">
            <button class="next-btn" id="nextBtn">⏩ Далее</button>
        </div>

        <!-- Сообщение обратной связи -->
        <div style="text-align:center;">
            <span class="feedback-msg" id="feedbackMsg"></span>
        </div>

        <!-- История ответов (шарики) -->
        <div style="text-align:center; margin-top: 4px;">
            <div class="history-dots" id="historyDots"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
